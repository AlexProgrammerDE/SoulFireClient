name: Release

on:
  workflow_dispatch:
    inputs:
      app-version:
        description: "Version tag to release"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: macos-15-intel
            platform: macos
            arch: x64
          - os: macos-14
            platform: macos
            arch: arm64
          - os: windows-2025
            platform: windows
            arch: x64
          - os: windows-11-arm
            platform: windows
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*
          check-latest: true

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5.0.0
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Build Electron release artifacts
        run: pnpm build:electron -- --${{ matrix.arch }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-artifacts/**
          if-no-files-found: error

  publish-release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-linux-x64
          path: release-artifacts/linux-x64

      - name: Download Linux arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-linux-arm64
          path: release-artifacts/linux-arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-macos-x64
          path: release-artifacts/macos-x64

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-macos-arm64
          path: release-artifacts/macos-arm64

      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-windows-x64
          path: release-artifacts/windows-x64

      - name: Download Windows arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-windows-arm64
          path: release-artifacts/windows-arm64

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # 3.0.0
        with:
          tag_name: ${{ inputs.app-version }}
          target_commitish: main
          token: ${{ secrets.GITHUB_TOKEN }}
          name: SoulFireClient ${{ inputs.app-version }}
          generate_release_notes: true
          files: release-artifacts/**/*
