name: Release

on:
  workflow_dispatch:
    inputs:
      app-version:
        description: "Version to release"
        required: true
      server-version:
        description: "Server version to use for release"
        required: true

permissions:
  contents: write

jobs:
  set-server-version:
    uses: soulfiremc-com/SoulFireClient/.github/workflows/set-server-version.yml@main
    with:
      version: ${{ inputs.server-version }}
    secrets: inherit

  set-version:
    needs: set-server-version
    uses: soulfiremc-com/SoulFireClient/.github/workflows/set-version.yml@main
    with:
      version: ${{ inputs.app-version }}
    secrets: inherit

  push-branch:
    needs: set-version
    name: Push Release Branch
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Push to release branch
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599 # 1.1.0
        with:
          branch: release

      - name: Push to demo branch
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599 # 1.1.0
        with:
          branch: demo

  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    needs: set-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: macos-15-intel
            platform: macos
            arch: x64
          - os: macos-14
            platform: macos
            arch: arm64
          - os: windows-2025
            platform: windows
            arch: x64
          - os: windows-11-arm
            platform: windows
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: lts/*
          check-latest: true

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install --yes libarchive-tools rpm

      - name: Build Electron release artifacts
        run: pnpm build:electron -- --${{ matrix.arch }} --config.extraMetadata.version=${{ inputs.app-version }}

      - name: Upload unsigned Windows installer
        if: matrix.platform == 'windows'
        id: upload-unsigned-installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: unsigned-installer-${{ matrix.arch }}
          path: release-artifacts/*.exe
          if-no-files-found: error

      - name: Notify admin for SignPath approval
        if: matrix.platform == 'windows'
        uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645 # 7.0.0
        with:
          webhook-url: ${{ secrets.ADMIN_WEBHOOK_URL }}
          content: <@864603174899941376> Permit the signing request for SoulFireClient ${{ inputs.app-version }} on windows-${{ matrix.arch }} https://app.signpath.io/Web/e091b552-3623-4d9d-83d7-059d8f32978b/SigningRequests

      - name: Submit SignPath signing request
        if: matrix.platform == 'windows'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # 2.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: e091b552-3623-4d9d-83d7-059d8f32978b
          project-slug: SoulFireClient
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ runner.temp }}/signed

      - name: Replace unsigned Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $signedInstaller = Get-ChildItem "${{ runner.temp }}/signed" -Filter *.exe | Select-Object -First 1
          if (-not $signedInstaller) {
            throw "No signed installer returned from SignPath."
          }
          Copy-Item $signedInstaller.FullName release-artifacts -Force

      - name: Refresh signed Windows updater metadata
        if: matrix.platform == 'windows'
        run: node scripts/refresh-electron-updater-metadata.mjs release-artifacts

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release-artifacts/*.AppImage
            release-artifacts/*.deb
            release-artifacts/*.pacman
            release-artifacts/*.rpm
            release-artifacts/*.dmg
            release-artifacts/*.exe
            release-artifacts/*.zip
            release-artifacts/*.yml
            release-artifacts/*.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: lts/*
          check-latest: true

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-linux-x64
          path: release-artifacts/linux-x64

      - name: Download Linux arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-linux-arm64
          path: release-artifacts/linux-arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-macos-x64
          path: release-artifacts/macos-x64

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-macos-arm64
          path: release-artifacts/macos-arm64

      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-windows-x64
          path: release-artifacts/windows-x64

      - name: Download Windows arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: release-windows-arm64
          path: release-artifacts/windows-arm64

      - name: Generate legacy Tauri updater manifest
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY || secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/generate-legacy-updater-assets.mjs release-artifacts ${{ inputs.app-version }}

      - name: Collect release file names
        id: release-files
        shell: bash
        run: |
          find_single_file() {
            local directory="$1"
            local pattern="$2"
            mapfile -t matches < <(find "$directory" -maxdepth 1 -type f -name "$pattern" -printf '%f\n' | sort)
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly one $pattern file in $directory, found ${#matches[@]}" >&2
              exit 1
            fi
            printf '%s' "${matches[0]}"
          }

          {
            echo "windowsX64File=$(find_single_file release-artifacts/windows-x64 '*.exe')"
            echo "windowsArm64File=$(find_single_file release-artifacts/windows-arm64 '*.exe')"
            echo "macosX64DmgFile=$(find_single_file release-artifacts/macos-x64 '*.dmg')"
            echo "macosArm64DmgFile=$(find_single_file release-artifacts/macos-arm64 '*.dmg')"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare GitHub release assets
        run: node scripts/prepare-electron-release-assets.mjs release-artifacts release-upload

      - name: Build changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@348e88fab4c37338b1e803ceb2d4a7a5db6c0833 # v6.2.2
        with:
          mode: COMMIT
          toTag: ${{ github.ref }}
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "commit_template": "- [`#{{SHORT_MERGE_SHA}}`](https://github.com/soulfiremc-com/SoulFireClient/commit/#{{MERGE_SHA}}) #{{TITLE}}",
              "categories": [
                {
                    "title": "## 🚀 Features",
                    "labels": ["feat", "feature"]
                },
                {
                    "title": "## 🐛 Fixes",
                    "labels": ["fix", "bug"]
                },
                {
                    "title": "## 🏎️ Performance",
                    "labels": ["perf"]
                },
                {
                    "title": "## 🏗 Refactor",
                    "labels": ["refactor"]
                },
                {
                    "title": "## 📝 Documentation",
                    "labels": ["docs"]
                },
                {
                    "title": "## 🔨 Build",
                    "labels": ["build", "chore", "ci"]
                },
                {
                    "title": "## 💅 Style",
                    "labels": ["style"]
                },
                {
                    "title": "## 🧪 Tests",
                    "labels": ["test"]
                },
                {
                    "title": "## 💬 Other",
                    "labels": []
                },
                {
                  "title": "## 📦 Dependencies",
                  "labels": ["dependencies"]
                }
              ],
              "empty_template": "no changes",
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ])+([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ],
              "custom_placeholders": [
                {
                  "name": "SHORT_MERGE_SHA",
                  "source": "MERGE_SHA",
                  "transformer": {
                    "pattern": "^([0-9a-f]{7})[0-9a-f]*$",
                    "target": "$1"
                  }
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # 3.0.0
        with:
          body: |
            ## Download Links

            | Platform              | Download Link |
            |-----------------------|---------------|
            | Windows (x86_64)      | [Download](https://github.com/soulfiremc-com/SoulFireClient/releases/download/${{ inputs.app-version }}/${{ steps.release-files.outputs.windowsX64File }}) |
            | Windows (AArch64)     | [Download](https://github.com/soulfiremc-com/SoulFireClient/releases/download/${{ inputs.app-version }}/${{ steps.release-files.outputs.windowsArm64File }}) |
            | macOS (Intel)         | [Download](https://github.com/soulfiremc-com/SoulFireClient/releases/download/${{ inputs.app-version }}/${{ steps.release-files.outputs.macosX64DmgFile }}) |
            | macOS (Apple Silicon) | [Download](https://github.com/soulfiremc-com/SoulFireClient/releases/download/${{ inputs.app-version }}/${{ steps.release-files.outputs.macosArm64DmgFile }}) |
            | Linux (x86_64)        | [Download](https://flathub.org/apps/com.soulfiremc.soulfire) |
            | Linux (AArch64)       | [Download](https://flathub.org/apps/com.soulfiremc.soulfire) |

            > [!TIP]
            > x86_64 means Intel and AMD CPUs; AArch64 means ARM CPUs like Qualcomm Snapdragon, which are used in some laptops.

            ${{ steps.github_release.outputs.changelog }}
          tag_name: ${{ inputs.app-version }}
          target_commitish: main
          token: ${{ secrets.GITHUB_TOKEN }}
          name: SoulFireClient ${{ inputs.app-version }}
          generate_release_notes: false
          files: release-upload/*

      - name: Announce new SoulFireClient release
        uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645 # 7.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          content: <@&850705047938793503> New SoulFireClient version released!
          embed-title: SoulFireClient ${{ inputs.app-version }}
          embed-description: SoulFireClient ${{ inputs.app-version }} has been released! Download at https://soulfiremc.com/download and changelog at https://github.com/soulfiremc-com/SoulFireClient/releases/tag/${{ inputs.app-version }}
          embed-color: 3312063
          embed-thumbnail-url: https://soulfiremc.com/logo.png
