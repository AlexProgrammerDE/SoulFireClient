syntax = "proto3";

option java_package = "com.soulfiremc.grpc.generated";
option java_multiple_files = true;

package soulfire.v1;

import "soulfire/api_docs.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

message AutomationPosition {
  double x = 1 [(google.api.field_behavior) = REQUIRED];
  double y = 2 [(google.api.field_behavior) = REQUIRED];
  double z = 3 [(google.api.field_behavior) = REQUIRED];
}

message AutomationRequirementTarget {
  string requirement_key = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];
  int32 count = 3 [(google.api.field_behavior) = REQUIRED];
}

enum AutomationPreset {
  AUTOMATION_PRESET_UNSPECIFIED = 0;
  AUTOMATION_PRESET_BALANCED_TEAM = 1;
  AUTOMATION_PRESET_INDEPENDENT_RUNNERS = 2;
  AUTOMATION_PRESET_CAUTIOUS_TEAM = 3;
}

enum AutomationRolePolicy {
  AUTOMATION_ROLE_POLICY_UNSPECIFIED = 0;
  AUTOMATION_ROLE_POLICY_STATIC_TEAM = 1;
  AUTOMATION_ROLE_POLICY_INDEPENDENT = 2;
}

enum AutomationTeamRole {
  AUTOMATION_TEAM_ROLE_UNSPECIFIED = 0;
  AUTOMATION_TEAM_ROLE_LEAD = 1;
  AUTOMATION_TEAM_ROLE_PORTAL_ENGINEER = 2;
  AUTOMATION_TEAM_ROLE_NETHER_RUNNER = 3;
  AUTOMATION_TEAM_ROLE_STRONGHOLD_SCOUT = 4;
  AUTOMATION_TEAM_ROLE_END_SUPPORT = 5;
}

enum AutomationTeamObjective {
  AUTOMATION_TEAM_OBJECTIVE_UNSPECIFIED = 0;
  AUTOMATION_TEAM_OBJECTIVE_BOOTSTRAP = 1;
  AUTOMATION_TEAM_OBJECTIVE_NETHER_PROGRESS = 2;
  AUTOMATION_TEAM_OBJECTIVE_STRONGHOLD_HUNT = 3;
  AUTOMATION_TEAM_OBJECTIVE_END_ASSAULT = 4;
  AUTOMATION_TEAM_OBJECTIVE_COMPLETE = 5;
}

enum AutomationGoalMode {
  AUTOMATION_GOAL_MODE_UNSPECIFIED = 0;
  AUTOMATION_GOAL_MODE_IDLE = 1;
  AUTOMATION_GOAL_MODE_ACQUIRE = 2;
  AUTOMATION_GOAL_MODE_BEAT = 3;
}

enum AutomationBeatPhase {
  AUTOMATION_BEAT_PHASE_UNSPECIFIED = 0;
  AUTOMATION_BEAT_PHASE_PREPARE_OVERWORLD = 1;
  AUTOMATION_BEAT_PHASE_ENTER_NETHER = 2;
  AUTOMATION_BEAT_PHASE_NETHER_COLLECTION = 3;
  AUTOMATION_BEAT_PHASE_RETURN_TO_OVERWORLD = 4;
  AUTOMATION_BEAT_PHASE_STRONGHOLD_SEARCH = 5;
  AUTOMATION_BEAT_PHASE_ACTIVATE_PORTAL = 6;
  AUTOMATION_BEAT_PHASE_END_FIGHT = 7;
  AUTOMATION_BEAT_PHASE_COMPLETE = 8;
}

message AutomationBotSettings {
  bool enabled = 1 [(google.api.field_behavior) = REQUIRED];
  bool allow_death_recovery = 2 [(google.api.field_behavior) = REQUIRED];
  int32 memory_scan_radius = 3 [(google.api.field_behavior) = REQUIRED];
  int32 memory_scan_interval_ticks = 4 [(google.api.field_behavior) = REQUIRED];
  int32 retreat_health_threshold = 5 [(google.api.field_behavior) = REQUIRED];
  int32 retreat_food_threshold = 6 [(google.api.field_behavior) = REQUIRED];
  AutomationTeamRole role_override = 7 [(google.api.field_behavior) = REQUIRED];
}

message AutomationInstanceSettings {
  AutomationPreset preset = 1 [(google.api.field_behavior) = REQUIRED];
  bool team_collaboration = 2 [(google.api.field_behavior) = REQUIRED];
  AutomationRolePolicy role_policy = 3 [(google.api.field_behavior) = REQUIRED];
  bool shared_end_entry = 4 [(google.api.field_behavior) = REQUIRED];
  int32 max_end_bots = 5 [(google.api.field_behavior) = REQUIRED];
  bool shared_structure_intel = 6 [(google.api.field_behavior) = REQUIRED];
  bool shared_target_claims = 7 [(google.api.field_behavior) = REQUIRED];
  AutomationTeamObjective objective_override = 8 [(google.api.field_behavior) = REQUIRED];
  int32 target_blaze_rods = 9 [(google.api.field_behavior) = REQUIRED];
  int32 target_ender_pearls = 10 [(google.api.field_behavior) = REQUIRED];
  int32 target_ender_eyes = 11 [(google.api.field_behavior) = REQUIRED];
  int32 target_arrows = 12 [(google.api.field_behavior) = REQUIRED];
  int32 target_beds = 13 [(google.api.field_behavior) = REQUIRED];
}

message AutomationResourceQuota {
  string requirement_key = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];
  int32 current_count = 3 [(google.api.field_behavior) = REQUIRED];
  int32 target_count = 4 [(google.api.field_behavior) = REQUIRED];
}

message AutomationBotState {
  string instance_id = 1 [(google.api.field_behavior) = REQUIRED, (soulfire.v1.api_field).format = "uuid"];
  string bot_id = 2 [(google.api.field_behavior) = REQUIRED, (soulfire.v1.api_field).format = "uuid"];
  string account_name = 3 [(google.api.field_behavior) = REQUIRED];
  string status_summary = 4 [(google.api.field_behavior) = REQUIRED];
  AutomationGoalMode goal_mode = 5 [(google.api.field_behavior) = REQUIRED];
  bool paused = 6 [(google.api.field_behavior) = REQUIRED];
  optional AutomationBeatPhase beat_phase = 7;
  optional string current_action = 8;
  AutomationRequirementTarget target = 9 [(google.api.field_behavior) = REQUIRED];
  AutomationTeamRole team_role = 10 [(google.api.field_behavior) = REQUIRED];
  AutomationTeamObjective team_objective = 11 [(google.api.field_behavior) = REQUIRED];
  optional string dimension = 12;
  AutomationPosition position = 13 [(google.api.field_behavior) = REQUIRED];
  int32 death_count = 14 [(google.api.field_behavior) = REQUIRED];
  int32 timeout_count = 15 [(google.api.field_behavior) = REQUIRED];
  int32 recovery_count = 16 [(google.api.field_behavior) = REQUIRED];
  optional string last_recovery_reason = 17;
  google.protobuf.Timestamp last_progress_at = 18 [(google.api.field_behavior) = REQUIRED];
  AutomationBotSettings settings = 19 [(google.api.field_behavior) = REQUIRED];
  repeated AutomationRequirementTarget queued_targets = 20;
}

message AutomationTeamState {
  string instance_id = 1 [(google.api.field_behavior) = REQUIRED, (soulfire.v1.api_field).format = "uuid"];
  string friendly_name = 2 [(google.api.field_behavior) = REQUIRED];
  AutomationInstanceSettings settings = 3 [(google.api.field_behavior) = REQUIRED];
  AutomationTeamObjective objective = 4 [(google.api.field_behavior) = REQUIRED];
  int32 active_bots = 5 [(google.api.field_behavior) = REQUIRED];
  repeated AutomationResourceQuota quotas = 6;
  repeated AutomationBotState bots = 7;
}

message AutomationCoordinationSharedBlock {
  string observer_bot_id = 1 [(google.api.field_behavior) = REQUIRED];
  string observer_account_name = 2 [(google.api.field_behavior) = REQUIRED];
  string dimension = 3 [(google.api.field_behavior) = REQUIRED];
  int32 x = 4 [(google.api.field_behavior) = REQUIRED];
  int32 y = 5 [(google.api.field_behavior) = REQUIRED];
  int32 z = 6 [(google.api.field_behavior) = REQUIRED];
  string block_id = 7 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp last_seen_at = 8 [(google.api.field_behavior) = REQUIRED];
}

message AutomationCoordinationClaim {
  string key = 1 [(google.api.field_behavior) = REQUIRED];
  string owner_bot_id = 2 [(google.api.field_behavior) = REQUIRED];
  string owner_account_name = 3 [(google.api.field_behavior) = REQUIRED];
  AutomationPosition target = 4 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp expires_at = 5 [(google.api.field_behavior) = REQUIRED];
}

message AutomationCoordinationEyeSample {
  string bot_id = 1 [(google.api.field_behavior) = REQUIRED, (soulfire.v1.api_field).format = "uuid"];
  string account_name = 2 [(google.api.field_behavior) = REQUIRED];
  AutomationPosition origin = 3 [(google.api.field_behavior) = REQUIRED];
  AutomationPosition direction = 4 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp recorded_at = 5 [(google.api.field_behavior) = REQUIRED];
}

message AutomationSharedRequirementCount {
  string requirement_key = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];
  int32 current_count = 3 [(google.api.field_behavior) = REQUIRED];
  int32 target_count = 4 [(google.api.field_behavior) = REQUIRED];
}

message AutomationCoordinationState {
  string instance_id = 1 [(google.api.field_behavior) = REQUIRED, (soulfire.v1.api_field).format = "uuid"];
  string friendly_name = 2 [(google.api.field_behavior) = REQUIRED];
  AutomationInstanceSettings settings = 3 [(google.api.field_behavior) = REQUIRED];
  AutomationTeamObjective objective = 4 [(google.api.field_behavior) = REQUIRED];
  int32 active_bots = 5 [(google.api.field_behavior) = REQUIRED];
  int32 shared_block_count = 6 [(google.api.field_behavior) = REQUIRED];
  int32 claim_count = 7 [(google.api.field_behavior) = REQUIRED];
  int32 eye_sample_count = 8 [(google.api.field_behavior) = REQUIRED];
  repeated AutomationSharedRequirementCount shared_counts = 9;
  repeated AutomationCoordinationSharedBlock shared_blocks = 10;
  repeated AutomationCoordinationClaim claims = 11;
  repeated AutomationCoordinationEyeSample eye_samples = 12;
}

message AutomationMemoryBlock {
  int32 x = 1 [(google.api.field_behavior) = REQUIRED];
  int32 y = 2 [(google.api.field_behavior) = REQUIRED];
  int32 z = 3 [(google.api.field_behavior) = REQUIRED];
  string block_id = 4 [(google.api.field_behavior) = REQUIRED];
  int64 last_seen_tick = 5 [(google.api.field_behavior) = REQUIRED];
}

message AutomationMemoryContainer {
  int32 x = 1 [(google.api.field_behavior) = REQUIRED];
  int32 y = 2 [(google.api.field_behavior) = REQUIRED];
  int32 z = 3 [(google.api.field_behavior) = REQUIRED];
  string block_id = 4 [(google.api.field_behavior) = REQUIRED];
  bool inspected = 5 [(google.api.field_behavior) = REQUIRED];
  int32 distinct_item_kinds = 6 [(google.api.field_behavior) = REQUIRED];
  int32 total_item_count = 7 [(google.api.field_behavior) = REQUIRED];
  int64 last_seen_tick = 8 [(google.api.field_behavior) = REQUIRED];
}

message AutomationMemoryEntity {
  string entity_id = 1 [(google.api.field_behavior) = REQUIRED];
  string entity_type = 2 [(google.api.field_behavior) = REQUIRED];
  AutomationPosition position = 3 [(google.api.field_behavior) = REQUIRED];
  int64 last_seen_tick = 4 [(google.api.field_behavior) = REQUIRED];
}

message AutomationMemoryDroppedItem {
  string entity_id = 1 [(google.api.field_behavior) = REQUIRED];
  string item_id = 2 [(google.api.field_behavior) = REQUIRED];
  int32 count = 3 [(google.api.field_behavior) = REQUIRED];
  AutomationPosition position = 4 [(google.api.field_behavior) = REQUIRED];
  int64 last_seen_tick = 5 [(google.api.field_behavior) = REQUIRED];
}

message AutomationMemoryUnreachablePosition {
  int32 x = 1 [(google.api.field_behavior) = REQUIRED];
  int32 y = 2 [(google.api.field_behavior) = REQUIRED];
  int32 z = 3 [(google.api.field_behavior) = REQUIRED];
  int64 until_tick = 4 [(google.api.field_behavior) = REQUIRED];
}

message AutomationMemoryState {
  string instance_id = 1 [(google.api.field_behavior) = REQUIRED, (soulfire.v1.api_field).format = "uuid"];
  string bot_id = 2 [(google.api.field_behavior) = REQUIRED, (soulfire.v1.api_field).format = "uuid"];
  string account_name = 3 [(google.api.field_behavior) = REQUIRED];
  int64 tick = 4 [(google.api.field_behavior) = REQUIRED];
  int32 remembered_block_count = 5 [(google.api.field_behavior) = REQUIRED];
  int32 remembered_container_count = 6 [(google.api.field_behavior) = REQUIRED];
  int32 remembered_entity_count = 7 [(google.api.field_behavior) = REQUIRED];
  int32 remembered_dropped_item_count = 8 [(google.api.field_behavior) = REQUIRED];
  int32 unreachable_position_count = 9 [(google.api.field_behavior) = REQUIRED];
  repeated AutomationMemoryBlock blocks = 10;
  repeated AutomationMemoryContainer containers = 11;
  repeated AutomationMemoryEntity entities = 12;
  repeated AutomationMemoryDroppedItem dropped_items = 13;
  repeated AutomationMemoryUnreachablePosition unreachable_positions = 14;
}

