service AutomationService {
  rpc GetAutomationTeamState (GetAutomationTeamStateRequest) returns (GetAutomationTeamStateResponse) {
    option (google.api.http) = { get: "/v1/instances/{instance_id}/automation" };
    option (soulfire.v1.api_method) = {
      display_name: "Get automation team state"
      permissions: "READ_BOT_INFO"
      scope: "instance"
    };
  }

  rpc GetAutomationCoordinationState (GetAutomationCoordinationStateRequest) returns (GetAutomationCoordinationStateResponse) {
    option (google.api.http) = { get: "/v1/instances/{instance_id}/automation/coordination" };
    option (soulfire.v1.api_method) = {
      display_name: "Get automation coordination state"
      permissions: "READ_BOT_INFO"
      scope: "instance"
    };
  }

  rpc GetAutomationBotState (GetAutomationBotStateRequest) returns (GetAutomationBotStateResponse) {
    option (google.api.http) = { get: "/v1/instances/{instance_id}/automation/bots/{bot_id}" };
    option (soulfire.v1.api_method) = {
      display_name: "Get automation bot state"
      permissions: "READ_BOT_INFO"
      scope: "instance.bot"
    };
  }

  rpc GetAutomationMemoryState (GetAutomationMemoryStateRequest) returns (GetAutomationMemoryStateResponse) {
    option (google.api.http) = { get: "/v1/instances/{instance_id}/automation/bots/{bot_id}/memory" };
    option (soulfire.v1.api_method) = {
      display_name: "Get automation memory state"
      permissions: "READ_BOT_INFO"
      scope: "instance.bot"
    };
  }

  rpc StartAutomationBeat (AutomationActionRequest) returns (AutomationActionResponse) {
    option (google.api.http) = {
      post: "/v1/instances/{instance_id}/automation:beat"
      body: "*"
    };
    option (soulfire.v1.api_method) = {
      display_name: "Start automation beat"
      permissions: "INSTANCE_COMMAND_EXECUTION"
      scope: "instance"
      side_effects: "Starts beat-the-game automation for the selected connected bots."
    };
  }

  rpc StartAutomationAcquire (StartAutomationAcquireRequest) returns (AutomationActionResponse) {
    option (google.api.http) = {
      post: "/v1/instances/{instance_id}/automation:acquire"
      body: "*"
    };
    option (soulfire.v1.api_method) = {
      display_name: "Start automation acquire"
      permissions: "INSTANCE_COMMAND_EXECUTION"
      scope: "instance"
      side_effects: "Starts an acquire goal for the selected connected bots."
    };
  }

  rpc PauseAutomation (AutomationActionRequest) returns (AutomationActionResponse) {
    option (google.api.http) = {
      post: "/v1/instances/{instance_id}/automation:pause"
      body: "*"
    };
    option (soulfire.v1.api_method) = {
      display_name: "Pause automation"
      permissions: "INSTANCE_COMMAND_EXECUTION"
      scope: "instance"
      side_effects: "Pauses automation without clearing the current goal."
    };
  }

  rpc ResumeAutomation (AutomationActionRequest) returns (AutomationActionResponse) {
    option (google.api.http) = {
      post: "/v1/instances/{instance_id}/automation:resume"
      body: "*"
    };
    option (soulfire.v1.api_method) = {
      display_name: "Resume automation"
      permissions: "INSTANCE_COMMAND_EXECUTION"
      scope: "instance"
      side_effects: "Resumes automation for the selected connected bots."
    };
  }

